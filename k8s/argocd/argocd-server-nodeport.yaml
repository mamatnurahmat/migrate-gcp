# Patch: ubah argocd-server Service dari ClusterIP ke NodePort
# NodePort 30080 → HTTP  (port 80)
# NodePort 30443 → HTTPS (port 443)
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8080
      nodePort: 30443
      protocol: TCP
