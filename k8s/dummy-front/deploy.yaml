apiVersion: apps/v1
kind: Deployment
metadata:
  name: dummy-front
  namespace: front
  labels:
    app: dummy-front
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dummy-front
  template:
    metadata:
      labels:
        app: dummy-front
        tier: frontend
    spec:
      # Jadwalkan ke node pool "front"
      nodeSelector:
        role: front

      # Tolerasi taint role=front:NoSchedule
      tolerations:
        - key: "role"
          operator: "Equal"
          value: "front"
          effect: "NoSchedule"

      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

          # Custom index page menampilkan nama pod dan node
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "<html><body style='font-family:sans-serif;padding:40px;background:#f0f4ff'>
                    <h1>🖥️ Dummy Frontend</h1>
                    <p><b>Node Pool:</b> front</p>
                    <p><b>Region:</b> asia-southeast2 (Jakarta)</p>
                    <p><b>Pod:</b> ${HOSTNAME}</p>
                    </body></html>" > /usr/share/nginx/html/index.html

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

      # Sebut prioritas rendah agar tidak bersaing dengan prod
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dummy-front-svc
  namespace: front
  labels:
    app: dummy-front
spec:
  type: LoadBalancer
  selector:
    app: dummy-front
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
